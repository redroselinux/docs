<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Redrose Linux Docs</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link
            rel="icon"
            type="image/x-icon"
            href="https://redroselinux.org/assets/redrose-logo-transparent.png"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
        />
        <link rel="stylesheet" href="theme.css" />
    </head>
    <body>
        <div id="app">
            <h1 style="font-size: 32px">Loading...</h1>
            <span style="font-size: 16px"
                >If the site is stuck at loading, check the console for errors
                or read the docs on Github: redroselinux/docs.<br />
                <span style="color: yellow"
                    >If you are a scraper or an AI agent, you need a full
                    browser to view dynamic content.</span
                ></span
            >
        </div>

        <script>
            window.$docsify = {
                name: "Redrose Docs",
                repo: "https://github.com/redroselinux/docs",
                basePath: "./docs/",
                loadSidebar: true,
                subMaxLevel: 2,
                plugins: [
                    function (hook, vm) {
                        hook.afterEach(function (html) {
                            return html;
                        });
                        hook.doneEach(function () {
                            var sidebar = document.querySelector(".sidebar");
                            if (!sidebar) return;
                            var nameEl =
                                sidebar.querySelector("h1, .app-name-link");
                            if (!nameEl || nameEl.querySelector("img")) return;
                            var img = document.createElement("img");
                            img.src =
                                "https://redroselinux.org/assets/redrose-logo-transparent.png";
                            img.style.height = "26px";
                            img.style.width = "26px";
                            img.style.marginRight = "8px";
                            img.style.verticalAlign = "middle";
                            nameEl.insertBefore(img, nameEl.firstChild);
                        });
                    },
                ],
            };
        </script>

        <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
        <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
        <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
        <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
        <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    </body>
</html>
